<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DasDigital Pro | Premium Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background: #0f172a;
            color: white;
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            transition: 0.3s ease;
        }
        .glass:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.2); }
        
        /* Custom File Input Style */
        input[type="file"]::file-selector-button {
            border-radius: 12px;
            padding: 8px 16px;
            background: #fff;
            color: #000;
            border: none;
            font-weight: 800;
            cursor: pointer;
            font-size: 10px;
            text-transform: uppercase;
        }

        .btn-gradient {
            background: linear-gradient(90deg, #6366f1, #a855f7);
            transition: 0.3s;
        }
        .btn-gradient:hover { opacity: 0.9; transform: scale(1.02); }
    </style>
</head>
<body class="p-4 md:p-10">

    <nav class="max-w-5xl mx-auto mb-16 text-center">
        <h1 class="text-4xl font-black tracking-tighter">DAS<span class="text-indigo-500">DIGITAL</span></h1>
        <p class="text-[10px] uppercase tracking-[5px] opacity-40 mt-2 font-bold">Premium Digital Workspace</p>
    </nav>

    <main class="max-w-5xl mx-auto space-y-10">
        
        <section class="glass p-8 md:p-10 border-l-8 border-indigo-500">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                <div>
                    <h2 class="text-2xl font-extrabold mb-2 text-indigo-400">01. Image to PDF</h2>
                    <p class="text-sm opacity-50">Convert multiple images into a single document.</p>
                </div>
                <div class="w-full md:w-auto space-y-4">
                    <input type="file" id="pdfInput" multiple accept="image/*" class="w-full text-xs">
                    <button onclick="makePDF()" class="w-full md:w-64 py-4 btn-gradient rounded-2xl font-black text-[11px] uppercase tracking-widest">
                        Download PDF
                    </button>
                </div>
            </div>
        </section>

        <section class="glass p-8 md:p-10 border-l-8 border-emerald-500">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                <div>
                    <h2 class="text-2xl font-extrabold mb-2 text-emerald-400">02. KB Resizer</h2>
                    <p class="text-sm opacity-50">Compress photo size for online forms.</p>
                </div>
                <div class="w-full md:w-auto flex flex-col gap-4">
                    <div class="flex gap-2">
                        <input type="number" id="targetKB" placeholder="Target KB" class="w-24 bg-white/10 border-none rounded-xl p-3 text-sm font-bold focus:ring-2 focus:ring-emerald-500 outline-none">
                        <input type="file" id="resizeInput" accept="image/*" class="text-[10px] self-center">
                    </div>
                    <button onclick="resizeKB()" class="w-full md:w-64 py-4 bg-emerald-600 rounded-2xl font-black text-[11px] uppercase tracking-widest">
                        Resize & Save
                    </button>
                </div>
            </div>
        </section>

        <section class="glass p-8 md:p-10 border-l-8 border-orange-500">
            <div class="mb-8">
                <h2 class="text-3xl font-extrabold mb-2 text-orange-400">03. Passport Studio</h2>
                <p class="text-sm opacity-50">High-Resolution prints with auto-centering.</p>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase opacity-40 tracking-widest">Select Photo</label>
                    <input type="file" id="passInput" accept="image/*" class="w-full text-xs">
                </div>
                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase opacity-40 tracking-widest">Format</label>
                    <select id="sizeSelect" class="w-full bg-white/10 border-none rounded-xl p-3 text-sm font-bold text-white outline-none">
                        <option value="passport" class="text-black">Passport (3.5x4.5cm)</option>
                        <option value="stamp" class="text-black">Stamp (2x2.5cm)</option>
                    </select>
                </div>
                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase opacity-40 tracking-widest">Layout</label>
                    <select id="layoutSelect" class="w-full bg-white/10 border-none rounded-xl p-3 text-sm font-bold text-white outline-none">
                        <option value="single" class="text-black">Single Photo</option>
                        <option value="a4_8" class="text-black">A4 - 8 Photos</option>
                        <option value="a4_24" class="text-black">A4 - 24 Photos</option>
                    </select>
                </div>
            </div>
            <button onclick="makePassportHD()" class="w-full py-5 bg-orange-600 rounded-2xl font-black text-xs uppercase tracking-[4px] mt-8 hover:bg-orange-500 transition">
                Create HD Print
            </button>
        </section>

    </main>

    <footer class="mt-20 py-10 text-center opacity-20 text-[10px] font-bold tracking-[5px] uppercase">
        Designed for Professionals • Amit Das
    </footer>

    <script src="script.js"></script>
</body>
</html>
