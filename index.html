<div class="tool-card bg-white p-6 rounded-2xl shadow-sm border">
    <div class="w-12 h-12 bg-orange-100 rounded-xl flex items-center justify-center mb-4 text-2xl">📸</div>
    <h3 class="text-xl font-bold mb-2">Passport Photo</h3>
    <input type="file" id="passInput" class="block w-full text-xs mb-4" accept="image/*">
    <div class="grid grid-cols-2 gap-2 mb-4">
        <select id="sizeSelect" class="p-2 border rounded text-xs">
            <option value="passport">Passport (3.5x4.5cm)</option>
            <option value="stamp">Stamp (2x2.5cm)</option>
        </select>
        <select id="layoutSelect" class="p-2 border rounded text-xs">
            <option value="single">Single Photo</option>
            <option value="a4_8">A4 (8 Photos)</option>
        </select>
    </div>
    <button onclick="makePassportPhoto()" class="w-full bg-orange-600 text-white py-3 rounded-xl font-bold hover:bg-orange-700">Create Photo</button>
</div>

<div class="tool-card bg-white p-6 rounded-2xl shadow-sm border">
    <div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center mb-4 text-2xl">📐</div>
    <h3 class="text-xl font-bold mb-2">Image Resizer (KB Control)</h3>
    <input type="file" id="resizeInput" class="block w-full text-xs mb-4" accept="image/*">
    <div class="flex gap-2 mb-4">
        <input type="number" id="targetKB" placeholder="Target KB (e.g. 50)" class="w-full p-2 border rounded text-xs">
        <span class="p-2 text-xs font-bold">KB</span>
    </div>
    <button onclick="resizeImgWithKB()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700">Compress & Resize</button>
</div>
