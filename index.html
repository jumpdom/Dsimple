<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DasDigital Pro | Professional Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: white; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; }
        .btn-action { transition: 0.3s; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        .btn-action:active { transform: scale(0.95); }
        input, select { background: rgba(0,0,0,0.4) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; border-radius: 12px !important; padding: 10px !important; outline: none; }
        input[type="file"]::file-selector-button { border-radius: 10px; background: white; color: black; border: none; font-weight: 800; cursor: pointer; font-size: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <nav class="max-w-4xl mx-auto mb-10 text-center">
        <h1 class="text-3xl font-black">DAS<span class="text-blue-500">DIGITAL</span> PRO</h1>
        <p class="text-[10px] opacity-40 tracking-[4px]">AUTOMATED STUDIO SOLUTIONS</p>
    </nav>

    <main class="max-w-4xl mx-auto space-y-8">
        
        <section class="glass p-6 border-l-4 border-indigo-500">
            <h2 class="text-xl font-bold mb-4">01. Image to PDF</h2>
            <div class="flex flex-col md:flex-row gap-4">
                <input type="file" id="pdfInput" multiple accept="image/*" class="flex-1">
                <button onclick="makePDF()" class="bg-indigo-600 px-8 py-3 rounded-xl btn-action text-xs">Convert to PDF</button>
            </div>
        </section>

        <section class="glass p-6 border-l-4 border-emerald-500">
            <h2 class="text-xl font-bold mb-4">02. Exact KB Resizer</h2>
            <div class="flex flex-col md:flex-row gap-4 items-center">
                <input type="number" id="targetKB" placeholder="Target KB" class="w-full md:w-32">
                <input type="file" id="resizeInput" accept="image/*" class="flex-1">
                <button onclick="resizeKB()" class="bg-emerald-600 px-8 py-3 rounded-xl btn-action text-xs w-full md:w-auto">Resize Now</button>
            </div>
        </section>

        <section class="glass p-8 border-l-4 border-orange-500">
            <h2 class="text-2xl font-bold mb-6">03. Passport Studio (Manual Qty)</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-bold opacity-50">CHOOSE PHOTO</label>
                    <input type="file" id="passInput" accept="image/*">
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-bold opacity-50">SIZE</label>
                    <select id="sizeSelect">
                        <option value="passport">Passport (3.5x4.5cm)</option>
                        <option value="stamp">Stamp (2x2.5cm)</option>
                    </select>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-bold opacity-50">QUANTITY (1-30)</label>
                    <input type="number" id="photoQty" value="1" min="1" max="30">
                </div>
            </div>
            <button onclick="makePassportHD()" id="passBtn" class="w-full bg-orange-600 py-4 rounded-2xl btn-action text-sm">Download Studio Print</button>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
