<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DasDigital Pro | Premium Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
        }

        .glass-dark {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }

        .premium-btn {
            background: white;
            color: #e73c7e;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .premium-btn:hover {
            transform: scale(1.05);
            background: #000;
            color: #fff;
        }

        select, input[type="number"] {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 15px;
            padding: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="max-w-6xl mx-auto mb-12 flex justify-between items-center text-white">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tighter">DAS<span class="text-black">DIGITAL</span></h1>
            <p class="text-[10px] uppercase tracking-[4px] opacity-80 font-bold">The Future of Studio</p>
        </div>
        <div class="hidden md:block text-xs font-bold bg-white/20 px-4 py-2 rounded-full border border-white/30">PREMIUM EDITION 2026</div>
    </nav>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-8 glass p-8 md:p-12 text-white shadow-2xl">
            <h2 class="text-4xl font-bold mb-2">Studio Hub</h2>
            <p class="mb-10 opacity-80 text-sm font-medium">Create High-Definition Passport Prints instantly.</p>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <div class="space-y-6">
                    <div class="space-y-3">
                        <label class="text-xs font-bold uppercase tracking-widest opacity-70">1. Select Photo</label>
                        <input type="file" id="passInput" class="block w-full text-sm text-white
                            file:mr-4 file:py-3 file:px-6
                            file:rounded-full file:border-0
                            file:text-sm file:font-extrabold
                            file:bg-white file:text-black
                            hover:file:bg-gray-200 cursor-pointer transition-all" 
                            accept="image/*">
                    </div>

                    <div class="space-y-3">
                        <label class="text-xs font-bold uppercase tracking-widest opacity-70">2. Photo Size</label>
                        <select id="sizeSelect" class="w-full text-black outline-none focus:ring-4 focus:ring-white/20">
                            <option value="passport">Passport Size (3.5x4.5 cm)</option>
                            <option value="stamp">Stamp Size (2x2.5 cm)</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-6 flex flex-col justify-between">
                    <div class="space-y-3">
                        <label class="text-xs font-bold uppercase tracking-widest opacity-70">3. Print Layout</label>
                        <select id="layoutSelect" class="w-full text-black outline-none focus:ring-4 focus:ring-white/20">
                            <option value="single">Single Copy</option>
                            <option value="a4_8">A4 Sheet (8 Photos)</option>
                            <option value="a4_24">A4 Sheet (24 Photos)</option>
                        </select>
                    </div>

                    <button onclick="makePassportHD()" class="premium-btn w-full py-5 rounded-2xl font-black text-sm uppercase tracking-widest mt-4">
                        Download HD Print
                    </button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-4 space-y-6">
            <div class="glass-dark p-8 rounded-[30px] border-none">
                <h3 class="text-xl font-bold mb-6">Smart Utilities</h3>
                
                <div class="space-y-6">
                    <div>
                        <span class="text-[10px] font-black uppercase opacity-60">KB Compression</span>
                        <div class="flex gap-2 mt-2 mb-2">
                            <input type="number" id="targetKB" placeholder="KB" class="w-20 text-black text-center">
                            <input type="file" id="resizeInput" class="text-[10px] mt-2">
                        </div>
                        <button onclick="resizeKB()" class="w-full bg-white/20 hover:bg-white/40 py-2 rounded-xl text-[10px] font-bold uppercase transition">Resize Now</button>
                    </div>

                    <div class="pt-6 border-t border-white/10">
                        <span class="text-[10px] font-black uppercase opacity-60">Multi-Image to PDF</span>
                        <input type="file" id="pdfInput" multiple class="text-[10px] mt-3 block w-full">
                        <button onclick="makePDF()" class="w-full mt-4 bg-black text-white py-4 rounded-2xl text-xs font-extrabold uppercase hover:bg-gray-800 transition">Download PDF</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-10 text-white/60 text-[10px] font-bold tracking-[2px] uppercase">
        Developed by Amit Das &bull; DasDigital.xyz
    </footer>

    <script src="script.js"></script>
</body>
</html>
