<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DasDigital | Premium Studio Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07); border-radius: 24px; transition: 0.4s; }
        .glass-card:hover { transform: translateY(-8px); border-color: #3b82f6; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .btn-premium { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); transition: 0.3s; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
        .btn-premium:active { transform: scale(0.96); }
        input[type="range"] { height: 6px; -webkit-appearance: none; border-radius: 10px; background: #e2e8f0; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: #2563eb; border-radius: 50%; cursor: pointer; border: 3px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-6xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-2xl font-black text-blue-600 leading-none">DAS<span class="text-slate-900">DIGITAL</span></span>
                <span class="text-[10px] font-bold text-slate-400 tracking-[0.2em] uppercase mt-1">Studio Pro v3.0</span>
            </div>
            <div class="hidden md:flex gap-6 text-sm font-semibold text-slate-600">
                <a href="#" class="hover:text-blue-600 transition">Passport</a>
                <a href="#" class="hover:text-blue-600 transition">Resizer</a>
                <a href="#" class="hover:text-blue-600 transition">PDF Scan</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            
            <div class="lg:col-span-8 glass-card p-8 bg-white">
                <div class="flex items-center gap-4 mb-8">
                    <div class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center text-3xl">📸</div>
                    <div>
                        <h2 class="text-2xl font-extrabold text-slate-900">Passport Photo Studio</h2>
                        <p class="text-sm text-slate-500">Perfect alignment with HD Print quality</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-6">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase mb-3">1. Upload Image</label>
                            <div class="relative group">
                                <input type="file" id="passInput" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" accept="image/*">
                                <div class="border-2 border-dashed border-slate-200 rounded-2xl p-6 text-center group-hover:border-blue-400 transition">
                                    <span class="text-sm font-semibold text-slate-500">Click or Drag Photo</span>
                                </div>
                            </div>
                        </div>

                        <div class="bg-slate-50 p-6 rounded-3xl space-y-5 border border-slate-100">
                            <label class="block text-xs font-bold text-slate-400 uppercase">2. Adjust Filters</label>
                            <div>
                                <div class="flex justify-between text-xs font-bold mb-2"><span>Brightness</span><span id="bVal">100%</span></div>
                                <input type="range" id="brightness" min="50" max="150" value="100" class="w-full" oninput="updateLabel('bVal', this.value)">
                            </div>
                            <div>
                                <div class="flex justify-between text-xs font-bold mb-2"><span>Contrast</span><span id="cVal">100%</span></div>
                                <input type="range" id="contrast" min="50" max="150" value="100" class="w-full" oninput="updateLabel('cVal', this.value)">
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-col justify-between">
                        <div class="space-y-4">
                            <label class="block text-xs font-bold text-slate-400 uppercase">3. Choose Layout</label>
                            <select id="sizeSelect" class="w-full p-4 rounded-2xl border border-slate-200 bg-white text-sm font-semibold focus:ring-2 focus:ring-blue-500 outline-none">
                                <option value="passport">Standard Passport (3.5x4.5cm)</option>
                                <option value="stamp">Stamp Size (2x2.5cm)</option>
                            </select>
                            <select id="layoutSelect" class="w-full p-4 rounded-2xl border border-slate-200 bg-white text-sm font-semibold focus:ring-2 focus:ring-blue-500 outline-none">
                                <option value="single">Single Photo (Only 1)</option>
                                <option value="a4_8">A4 Sheet (8 Photos)</option>
                                <option value="a4_25">A4 Sheet (25 Photos)</option>
                            </select>
                        </div>

                        <button onclick="makePassportPhoto()" class="btn-premium w-full mt-10 py-5 text-white rounded-2xl font-extrabold text-lg flex items-center justify-center gap-3">
                            <span>GENERATE PRINT</span>
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4 space-y-8">
                <div class="glass-card p-6 bg-white">
                    <div class="flex items-center gap-3 mb-4">
                        <span class="text-xl">📐</span>
                        <h4 class="font-bold">Smart Resizer</h4>
                    </div>
                    <input type="number" id="targetKB" placeholder="Target KB (e.g. 50)" class="w-full p-3 rounded-xl border mb-3 text-sm outline-none">
                    <input type="file" id="resizeInput" class="text-[10px] mb-4 w-full" accept="image/*">
                    <button onclick="resizeImgWithKB()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold text-sm hover:bg-black transition">Resize Now</button>
                </div>

                <div class="glass-card p-6 bg-white border-blue-50">
                    <div class="flex items-center gap-3 mb-4">
                        <span class="text-xl">📄</span>
                        <h4 class="font-bold">PDF Scanner</h4>
                    </div>
                    <input type="file" id="pdfInput" class="text-[10px] mb-4 w-full" multiple accept="image/*">
                    <button onclick="makePDF()" class="w-full border-2 border-blue-600 text-blue-600 py-3 rounded-xl font-bold text-sm hover:bg-blue-50 transition">Combine to PDF</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-12 border-t border-slate-100 mt-12">
        <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center text-slate-400 text-xs gap-4">
            <p>&copy; 2026 DASDIGITAL.XYZ | Managed by Amit Das</p>
            <div class="flex gap-4">
                <span>Privacy Safe</span>
                <span>•</span>
                <span>High Resolution</span>
                <span>•</span>
                <span>No Server Logs</span>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        function updateLabel(id, val) { document.getElementById(id).innerText = val + '%'; }
    </script>
</body>
</html>
