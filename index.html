<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DasDigital Pro | Professional Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #2d1b4b, #1e293b);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh; color: white;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
            transition: 0.3s ease;
        }
        .glass:hover { transform: translateY(-5px); border-color: rgba(59, 130, 246, 0.4); }
        
        input[type="file"]::file-selector-button {
            border-radius: 12px; padding: 10px 20px;
            background: #fff; color: #000; border: none;
            font-weight: 800; cursor: pointer; font-size: 10px; text-transform: uppercase;
        }
        .btn-premium { background: linear-gradient(90deg, #3b82f6, #6366f1); transition: 0.3s; }
        .btn-premium:hover { opacity: 0.9; transform: scale(1.02); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }
        select, input[type="number"] {
            background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; padding: 12px; color: white; outline: none; font-weight: 600;
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <nav class="max-w-5xl mx-auto mb-16 text-center">
        <h1 class="text-4xl font-black tracking-tighter">DAS<span class="text-blue-500">DIGITAL</span></h1>
        <p class="text-[10px] uppercase tracking-[5px] opacity-40 mt-2 font-bold italic">High Definition Digital Hub</p>
    </nav>

    <main class="max-w-5xl mx-auto space-y-12">
        
        <section class="glass p-8 md:p-10 border-l-[10px] border-l-blue-500">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                <div>
                    <h2 class="text-3xl font-black mb-2">01. Image to PDF</h2>
                    <p class="text-sm opacity-50">Photos ko professional PDF document mein convert karein.</p>
                </div>
                <div class="w-full md:w-auto space-y-4">
                    <input type="file" id="pdfInput" multiple accept="image/*" class="w-full text-xs">
                    <button onclick="makePDF()" class="w-full md:w-64 py-4 btn-premium rounded-2xl font-black text-[11px] uppercase tracking-widest">Download PDF</button>
                </div>
            </div>
        </section>

        <section class="glass p-8 md:p-10 border-l-[10px] border-l-emerald-500">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                <div>
                    <h2 class="text-3xl font-black mb-2">02. KB Resizer</h2>
                    <p class="text-sm opacity-50">Precision size matching with HD quality.</p>
                </div>
                <div class="w-full md:w-auto space-y-4">
                    <div class="flex gap-2">
                        <input type="number" id="targetKB" placeholder="Target KB" class="w-24">
                        <input type="file" id="resizeInput" accept="image/*" class="text-[10px] self-center">
                    </div>
                    <button onclick="resizeKB()" class="w-full md:w-64 py-4 bg-emerald-600 rounded-2xl font-black text-[11px] uppercase tracking-widest hover:bg-emerald-500 transition shadow-lg shadow-emerald-900/20">Resize Photo</button>
                </div>
            </div>
        </section>

        <section class="glass p-8 md:p-12 border-l-[10px] border-l-orange-500">
            <div class="mb-10">
                <h2 class="text-4xl font-black mb-2">03. Passport Studio</h2>
                <p class="text-sm opacity-50">Smart centering HD prints. Enter any quantity manually.</p>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-end">
                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase opacity-40 tracking-widest">Select Photo</label>
                    <input type="file" id="passInput" accept="image/*" class="w-full text-xs">
                </div>
                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase opacity-40 tracking-widest">Format</label>
                    <select id="sizeSelect" class="w-full">
                        <option value="passport">Passport (3.5x4.5cm)</option>
                        <option value="stamp">Stamp (2x2.5cm)</option>
                    </select>
                </div>
                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase opacity-40 tracking-widest">How many Photos?</label>
                    <input type="number" id="photoQty" value="1" min="1" max="50" class="w-full text-center" placeholder="Ex: 8">
                </div>
            </div>
            <button onclick="makePassportHD()" class="w-full py-6 bg-orange-600 rounded-2xl font-black text-xs uppercase tracking-[5px] mt-10 hover:bg-orange-500 transition shadow-xl shadow-orange-900/20">
                GENERATE HD STUDIO PRINT
            </button>
        </section>

    </main>

    <footer class="mt-20 py-10 text-center opacity-30 text-[10px] font-bold tracking-[5px] uppercase">
        DasDigital.xyz • Managed by Amit Das
    </footer>

    <script src="script.js"></script>
</body>
</html>
